# Copy these sections into wrangler.toml after creating D1/R2 resources,
# or configure equivalent bindings in the Cloudflare Pages dashboard.

[[d1_databases]]
binding = "DB"
database_name = "business-card-db"
database_id = "<actual-d1-database-id>"

[[r2_buckets]]
binding = "CARD_IMAGES"
bucket_name = "business-card-images"
